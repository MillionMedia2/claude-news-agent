# Runs twice daily to publish articles whose Publication Date has arrived.
# 10am UTC (mid-morning UK) and 4pm UTC (late afternoon UK).
# Zap 3 has been disabled — this cron is the sole publish trigger,
# which prevents the duplicate publishing caused by overlapping triggers.

name: Publish Approved Articles

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC (mid-morning UK)
    - cron: '0 16 * * *'  # 4pm UTC (late afternoon UK)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run publish
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          DISCORD_WEBHOOK_NOTIFICATIONS: ${{ secrets.DISCORD_WEBHOOK_NOTIFICATIONS }}
