# Generates articles from approved headlines in the Headline Queue.
# Runs twice daily (10am and 4pm UTC) and on workflow_dispatch.
# Uses a concurrency group to prevent overlapping runs.

name: Generate Articles

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC daily
    - cron: '0 16 * * *'  # 4pm UTC daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: generate-articles
  cancel-in-progress: false

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/generate-article.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          DISCORD_WEBHOOK_NOTIFICATIONS: ${{ secrets.DISCORD_WEBHOOK_NOTIFICATIONS }}
