# Runs daily at 7am UTC to write any queued articles.
# Also triggered by Zapier after headline transfer,
# or manually via GitHub Actions UI.
#
# Concurrency group ensures only one article-generation run is ever
# active at a time. If a second run is triggered while one is in
# flight (e.g. Zapier firing during the daily cron), the new run
# will WAIT for the current one to finish rather than running in
# parallel. This is the final fix for the intermittent
# duplicate-article bug.

name: Generate Articles

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: generate-articles
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          DISCORD_WEBHOOK_NOTIFICATIONS: ${{ secrets.DISCORD_WEBHOOK_NOTIFICATIONS }}
